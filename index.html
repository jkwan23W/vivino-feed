<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinosophy Selection - Name Tags</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Printing Configuration */
        @page {
            size: A4 portrait;
            margin: 0mm;
        }

        @media print {
            .no-print { display: none !important; }
            body { 
                margin: 0 !important; 
                padding: 0 !important;
                background: white !important; 
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .page-container {
                display: block !important;
                width: 210mm;
                padding: 10mm;
            }
            .grid-container {
                display: grid !important;
                grid-template-columns: 70mm 70mm !important;
                gap: 0 !important;
                justify-content: center;
            }
            .name-tag-tent {
                border: 0.1mm solid #e0e0e0 !important;
                box-shadow: none !important;
                break-inside: avoid;
                page-break-inside: avoid;
                background-color: white !important;
            }
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8fafc;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 70mm);
            gap: 12px;
            padding: 20px;
            justify-content: center;
        }

        .name-tag-tent {
            width: 70mm;
            height: 70mm;
            background: white;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .fold-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            border-top: 1px dashed #e5e5e5;
            z-index: 10;
        }

        .tent-face-blank { height: 35mm; background-color: #fff; }

        .tent-face-name {
            height: 35mm;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 2mm;
        }

        .guest-name {
            font-family: 'Great Vibes', cursive;
            font-size: 26pt;
            color: #1a1a1a;
            text-align: center;
            line-height: 1.1;
        }

        .footer-logo {
            position: absolute;
            bottom: 2mm;
            font-size: 5pt;
            color: #bbb;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 400;
        }

        /* Settings UI for API Key */
        #settings-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- Header UI -->
    <div class="no-print p-6 bg-white border-b sticky top-0 z-50 shadow-md text-center">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="text-left">
                <h1 class="text-xl font-bold text-gray-900">Vinosophy Selection</h1>
                <p class="text-xs text-gray-500 italic">Print ready: A4 / 70mm x 70mm</p>
            </div>
            
            <div class="flex gap-3">
                <button onclick="toggleSettings()" class="p-2 text-gray-400 hover:text-rose-900 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </button>
                <button onclick="window.print()" class="bg-rose-900 text-white px-6 py-2 rounded-full font-bold hover:bg-rose-800 transition shadow-lg">
                    🖨️ PRINT PDF
                </button>
                <button onclick="getAIDinnerPlan()" id="ai-btn" class="bg-indigo-600 text-white px-6 py-2 rounded-full font-bold hover:bg-indigo-500 transition shadow-lg flex items-center gap-2">
                    ✨ AI BUTLER
                </button>
            </div>
        </div>

        <div id="ai-result" class="hidden mt-4 max-w-2xl mx-auto bg-rose-50 border border-rose-200 rounded-xl p-4 text-left">
            <div id="ai-status" class="text-rose-700 font-bold text-xs mb-1 uppercase tracking-wider"></div>
            <div id="ai-content" class="text-gray-800 text-sm italic leading-relaxed whitespace-pre-wrap"></div>
        </div>
    </div>

    <!-- API Key Modal -->
    <div id="settings-modal" class="no-print">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full mx-4">
            <h2 class="text-xl font-bold mb-4">API Settings</h2>
            <p class="text-sm text-gray-600 mb-4">Enter your Gemini API Key here. It will be saved locally in your browser and not uploaded to GitHub.</p>
            <input type="password" id="api-key-input" class="w-full border p-3 rounded-lg mb-4" placeholder="AI API Key...">
            <div class="flex justify-end gap-3">
                <button onclick="toggleSettings()" class="px-4 py-2 text-gray-500">Cancel</button>
                <button onclick="saveKey()" class="px-4 py-2 bg-rose-900 text-white rounded-lg font-bold">Save Key</button>
            </div>
        </div>
    </div>

    <!-- Tags Display -->
    <div class="page-container">
        <div id="tags-container" class="grid-container"></div>
    </div>

    <script>
        const guests = [
            "Ming Fang", "Shelley Hon", "Angel Wei", "Shirley Chiu", 
            "Pierre", "Peter Wu", "Dora Kam", "Mr Xing", 
            "Mr Lai", "YeoJun Jo", "Karen Kwan", "Ken Lai", 
            "Vanessa Lai", "Agnes Hon", "Lee Robinson", "Nicolas", 
            "Colin Zhong", "Bernard Lim"
        ];

        // Initialize Tags
        const container = document.getElementById('tags-container');
        guests.forEach(name => {
            const tag = document.createElement('div');
            tag.className = 'name-tag-tent';
            tag.innerHTML = `
                <div class="fold-line"></div>
                <div class="tent-face-blank"></div>
                <div class="tent-face-name">
                    <div class="guest-name">${name}</div>
                    <div class="footer-logo">Vinosophy Selection</div>
                </div>
            `;
            container.appendChild(tag);
        });

        // Key Management
        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
            document.getElementById('api-key-input').value = localStorage.getItem('gemini_api_key') || "";
        }

        function saveKey() {
            const val = document.getElementById('api-key-input').value;
            localStorage.setItem('gemini_api_key', val);
            toggleSettings();
        }

        async function getAIDinnerPlan() {
            const key = localStorage.getItem('gemini_api_key');
            if (!key) {
                toggleSettings();
                return;
            }

            const btn = document.getElementById('ai-btn');
            const resultDiv = document.getElementById('ai-result');
            const statusDiv = document.getElementById('ai-status');
            const contentDiv = document.getElementById('ai-content');

            btn.disabled = true;
            resultDiv.classList.remove('hidden');
            statusDiv.textContent = "Connecting to the Butler...";
            
            const prompt = `Sommelier for Vinosophy dinner. Guests: ${guests.join(", ")}. Provide an opening toast and 3 conversation topics.`;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                statusDiv.textContent = "✨ Sommelier's Note:";
                contentDiv.textContent = data.candidates[0].content.parts[0].text;
            } catch (err) {
                contentDiv.textContent = "Error: Please check your API key in settings.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
